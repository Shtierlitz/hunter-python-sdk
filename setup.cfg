[flake8]
dictionaries = en_US,python,technical
ignore = W503,WPS226,WPS227,WPS235,WPS473,WPS601,DAR101,DAR201,DAR301,DAR401
jobs = 1
max-line-length = 120
inline-quotes = double
multiline-quotes = double
docstring-quotes = double
exclude = .tox,.git,*/migrations/*,*/static/CACHE/*,docs,node_modules,venv
per-file-ignores =
    src/hunter_sdk/__init__.py: WPS410,WPS412
    tests/*: B009,I001,I003,I004,I005,S101,WPS118,WPS202,WPS204,WPS210,WPS211,WPS213,WPS226,WPS431,WPS441,WPS442,WPS432

[tool:pytest]
addopts = -p no:cacheprovider
testpaths = tests

[pycodestyle]
max-line-length = 120
exclude = .tox,.git,*/migrations/*,*/static/CACHE/*,docs,node_modules,venv

[mypy]
python_version = 3.11
allow_redefinition = False
check_untyped_defs = True
disallow_untyped_defs = True
ignore_errors = False
ignore_missing_imports = True
implicit_reexport = False
local_partial_types = True
no_implicit_optional = True
no_implicit_reexport = True
show_error_codes = True
strict_equality = True
strict_optional = True
warn_redundant_casts = True
warn_unreachable = True
warn_unused_configs = True
warn_unused_ignores = True

[mypy-*.migrations.*]
ignore_errors = True

[isort]
line_length = 120
include_trailing_comma = True
use_parentheses = True
multi_line_output = 3
